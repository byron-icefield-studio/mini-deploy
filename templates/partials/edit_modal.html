{# 编辑工程弹窗 / Edit project modal #}
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-card">
    <div class="modal-h">
      <h2>编辑工程</h2>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="card-b">
      <form onsubmit="submitEditForm(event)">
        <input type="hidden" name="_id" id="edit-id">
        <div class="form-grid">
          <div class="form-row">
            <label>工程名称 *</label>
            <input id="edit-name" name="name" required>
          </div>
          <div class="form-row">
            <label>服务名 *</label>
            <input id="edit-service-name" name="service_name" required>
          </div>
          <div class="form-row form-full">
            <label>仓库地址 *</label>
            <input id="edit-repo-url" name="repo_url" required>
          </div>
          <div class="form-row">
            <label>GitHub Token</label>
            <input id="edit-github-token" name="github_token" type="password" placeholder="留空保持不变">
          </div>
          <div class="form-row">
            <label>工程类型</label>
            <select id="edit-project-type" name="project_type" onchange="onProjectTypeChange(this)">
              <option value="">通用</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="frontend">前端</option>
            </select>
            <span class="form-hint">Python 项目通常无需手动指定依赖方式，平台会按仓库文件自动识别。</span>
          </div>
          <div class="form-row" data-python-only style="display:none">
            <label>Python 依赖方式</label>
            <div class="form-hint">无需配置，平台会自动识别。识别顺序为：<code>uv.lock</code> → <code>requirements.txt</code> → <code>pyproject.toml</code>。</div>
          </div>
          <div class="form-row" data-docker-only>
            <label>镜像名</label>
            <input id="edit-image-name" name="image_name" placeholder="myapp:latest">
          </div>
          <div class="form-row form-full" data-docker-only>
            <label>Compose 路径</label>
            <input id="edit-compose-file" name="compose_file" placeholder="{{ compose_file or '/container-cluster/docker-compose.yml' }}">
          </div>
          <div class="form-row form-full" data-docker-only>
            <label class="checkbox-label">
              <input type="checkbox" id="edit-self-service" name="self_service">
              <span>自重启服务</span>
            </label>
          </div>
          <div class="form-row" data-docker-only>
            <label>自定义构建命令</label>
            <input id="edit-build-command" name="build_command">
          </div>
          <div class="form-row" data-java-only style="display:none">
            <label>Java 版本</label>
            <input id="edit-java-version" name="java_version" placeholder="17">
          </div>
          <div class="form-row" data-frontend-only style="display:none">
            <label>前端代码子目录</label>
            <input id="edit-app-dir" name="app_dir">
          </div>
          <div class="form-row" data-frontend-only style="display:none">
            <label>产物目录</label>
            <input id="edit-dist-dir" name="dist_dir">
          </div>
          <div class="form-row" data-frontend-only style="display:none">
            <label>Node 版本</label>
            <input id="edit-node-version" name="node_version">
          </div>
          <div class="form-row" data-frontend-only style="display:none">
            <label>nginx 容器名</label>
            <input id="edit-nginx-container" name="nginx_container">
          </div>
          <div class="form-row" data-frontend-only style="display:none">
            <label>目标路径</label>
            <input id="edit-deploy-target-dir" name="deploy_target_dir" data-required-when-visible="true">
          </div>
          <div class="form-actions">
            <button type="submit" class="primary-btn">保存</button>
            <button type="button" class="cancel-btn" onclick="closeEditModal()">取消</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
