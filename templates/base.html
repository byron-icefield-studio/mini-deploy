{# 基础模板 / Base template for Mini Deploy #}
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Mini Deploy{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
nav{background:#1e293b;padding:.7rem 1.5rem;display:flex;align-items:center;gap:.75rem}
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
<nav>{% block nav_content %}{% endblock %}</nav>
<div class="page">{% block content %}{% endblock %}</div>
{% block modals %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
